version: '2'

services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_DB: stockticker
      POSTGRES_USER: stockticker
      POSTGRES_PASSWORD: stockticker_db_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: ./apps/api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./apps/api/.env.pi
    depends_on:
      - db

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: http://192.168.0.198:8000
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
